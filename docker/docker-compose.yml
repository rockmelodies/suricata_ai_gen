version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: suricata_ai_backend
    ports:
      - "5000:5000"
    volumes:
      - ../uploads:/app/uploads
      - ../suricata_rules.db:/app/backend/suricata_rules.db
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - APP_FILE=app_v2.py
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - suricata_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      target: production
    container_name: suricata_ai_frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - suricata_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  suricata_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16